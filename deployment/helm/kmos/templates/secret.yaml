{{- /*
KMOS_SECRET_* secrets. Rendered ONLY when secrets.create is true AND no existing
Secret is referenced. For production, prefer secrets.existingSecret (bring your
own) or an external secrets operator (External Secrets / Vault / cloud KMS CSI)
that produces a Secret with KMOS_SECRET_* keys — the Deployment references the
Secret by name, so any such source works unchanged.

KMOS resolves these via EnvSecretResolver (prefix KMOS_SECRET_), verified in
platform/configuration/src/infrastructure/env-secret-resolver.ts. Example:
reference "db/password" -> env var KMOS_SECRET_DB_PASSWORD.
*/}}
{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kmos.fullname" . }}-secrets
  labels:
    {{- include "kmos.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.values }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
---
{{- /*
KMOS_DATABASE_URL secret. Rendered from database.url ONLY when a DSN is provided
and no existing DB secret is referenced. For production, prefer
database.existingSecret pointing at a managed-Postgres credential Secret.
*/}}
{{- if and .Values.database.url (not .Values.database.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kmos.fullname" . }}-db
  labels:
    {{- include "kmos.labels" . | nindent 4 }}
type: Opaque
stringData:
  KMOS_DATABASE_URL: {{ .Values.database.url | quote }}
{{- end }}
