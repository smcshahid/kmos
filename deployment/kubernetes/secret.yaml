# KMOS secret TEMPLATE. Do NOT commit real secret values.
#
# Two categories of secret are wired here:
#  1. KMOS_DATABASE_URL  — the Postgres connection string (external Postgres).
#  2. KMOS_SECRET_*       — application secrets resolved by EnvSecretResolver
#                           (prefix KMOS_SECRET_), verified in
#                           platform/configuration/src/infrastructure/env-secret-resolver.ts.
#                           A reference "db/password" resolves to KMOS_SECRET_DB_PASSWORD.
#
# For production, prefer an external secrets operator (External Secrets, Vault,
# cloud KMS CSI) that produces a Secret named "kmos-secrets" with these keys,
# rather than committing this file. The Deployment references the Secret by name.
#
# Replace every "REPLACE_ME" value at apply time, e.g.:
#   kubectl -n kmos create secret generic kmos-secrets \
#     --from-literal=KMOS_DATABASE_URL='postgres://user:pass@host:5432/kmos' \
#     --from-literal=KMOS_SECRET_DB_PASSWORD='...'
apiVersion: v1
kind: Secret
metadata:
  name: kmos-secrets
  namespace: kmos
  labels:
    app.kubernetes.io/name: kmos
type: Opaque
stringData:
  KMOS_DATABASE_URL: "postgres://kmos:REPLACE_ME@REPLACE_ME_HOST:5432/kmos"
  # Add KMOS_SECRET_* entries as your configuration references require:
  # KMOS_SECRET_DB_PASSWORD: "REPLACE_ME"
