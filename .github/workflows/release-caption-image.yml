name: Release caption service image

# Builds the Knowledge Studio caption/ASR service image (yt-dlp + ffmpeg + node) and
# pushes it to Docker Hub. Same flow + secrets as the other images.
# Trigger manually (Actions → Release caption service image → Run workflow) or by pushing
# a `caption-v*` tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    tags: ['caption-v*']

jobs:
  image:
    name: Build & push (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve image tag + lowercase namespace
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME#caption-v}" >> "$GITHUB_OUTPUT"
          fi
          echo "ns=$(printf '%s' '${{ secrets.DOCKERHUB_USERNAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Fail early if Docker Hub secrets are missing
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Set repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN first."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: products/knowledge-studio/services/caption-service
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ steps.meta.outputs.ns }}/knowledge-studio-caption:${{ steps.meta.outputs.tag }}
            docker.io/${{ steps.meta.outputs.ns }}/knowledge-studio-caption:latest

      - name: Summary
        run: |
          echo "Pushed: docker.io/${{ steps.meta.outputs.ns }}/knowledge-studio-caption:${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
