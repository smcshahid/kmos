name: Release Podcast Studio image

# Builds the Podcast Studio container image (amd64) and pushes it to Docker Hub so an
# Olares / Kubernetes deployment can pull it — the SAME flow as the KMOS + Knowledge Studio
# images (the packaging standard). The image self-verifies at build time
# (products/podcast-studio/Dockerfile runs `npm run verify`). Reuses the existing secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub username (also the image namespace)
#   DOCKERHUB_TOKEN     — a Docker Hub access token with read/write
# Trigger manually (Actions → Release Podcast Studio image → Run workflow) or by pushing a
# `podcast-v*` tag (e.g. podcast-v1.0.0).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    tags: ['podcast-v*']

jobs:
  image:
    name: Build & push (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve image tag + lowercase namespace
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # strip the leading "podcast-v" from the tag ref (podcast-v1.0.0 -> 1.0.0)
            echo "tag=${GITHUB_REF_NAME#podcast-v}" >> "$GITHUB_OUTPUT"
          fi
          echo "ns=$(printf '%s' '${{ secrets.DOCKERHUB_USERNAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Fail early if Docker Hub secrets are missing
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Set repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN first."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: products/podcast-studio/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ steps.meta.outputs.ns }}/podcast-studio:${{ steps.meta.outputs.tag }}
            docker.io/${{ steps.meta.outputs.ns }}/podcast-studio:latest

      - name: Summary
        run: |
          echo "Pushed: docker.io/${{ steps.meta.outputs.ns }}/podcast-studio:${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Also tagged: latest" >> "$GITHUB_STEP_SUMMARY"
