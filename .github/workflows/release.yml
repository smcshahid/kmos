name: Ecosystem Release (KMOS + Knowledge Studio + Podcast Studio)

# The authoritative end-to-end ECOSYSTEM release automation (EPT-01). On a version tag
# `v*`: verify → build & push all three images (KMOS, Knowledge Studio, Podcast Studio)
# → package the Olares Application Chart (.tgz) → create ONE GitHub Release with the
# chart, ecosystem release notes, and checksums attached. The GitHub Release is the
# authoritative download location — no manual packaging, no repository spelunking.
#
# Requires repository secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Ecosystem version (e.g. 1.1.0)'
        required: true
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release + upload assets

jobs:
  verify:
    name: Verify (static + tests + conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run fitness
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run conformance

  release:
    name: Build images, package chart, publish ecosystem release
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version + namespace
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
          echo "ns=$(printf '%s' '${{ secrets.DOCKERHUB_USERNAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Fail early if Docker Hub secrets are missing
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Set repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN first."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push KMOS image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ steps.meta.outputs.ns }}/kmos:${{ steps.meta.outputs.version }}
            docker.io/${{ steps.meta.outputs.ns }}/kmos:latest

      - name: Build & push Knowledge Studio image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: products/knowledge-studio/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ steps.meta.outputs.ns }}/knowledge-studio:${{ steps.meta.outputs.version }}
            docker.io/${{ steps.meta.outputs.ns }}/knowledge-studio:latest

      - name: Build & push Podcast Studio image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: products/podcast-studio/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ steps.meta.outputs.ns }}/podcast-studio:${{ steps.meta.outputs.version }}
            docker.io/${{ steps.meta.outputs.ns }}/podcast-studio:latest

      - uses: azure/setup-helm@v4
        with: { version: 'v3.15.0' }

      - name: Package Olares Application Chart (.tgz) + checksums
        run: |
          mkdir -p dist/release
          helm package deployment/olares --version "${{ steps.meta.outputs.version }}" \
            --app-version "${{ steps.meta.outputs.version }}" -d dist/release
          ( cd dist/release && sha256sum *.tgz > SHA256SUMS.txt )
          ls -l dist/release

      - name: Assemble ecosystem release notes
        run: |
          V="${{ steps.meta.outputs.version }}"; NS="${{ steps.meta.outputs.ns }}"
          {
            echo "# KMOS Ecosystem v$V"
            echo
            echo "The first complete ecosystem release: the KMOS platform plus its two flagship applications."
            echo
            echo "## Images (Docker Hub, amd64)"
            echo "- \`docker.io/$NS/kmos:$V\`"
            echo "- \`docker.io/$NS/knowledge-studio:$V\`"
            echo "- \`docker.io/$NS/podcast-studio:$V\`"
            echo
            echo "## Install on Olares"
            echo "Download the attached Olares Application Chart (.tgz) and verify against SHA256SUMS.txt."
            echo "See documentation/OLARES-DEPLOYMENT-GUIDE.md. Full notes: documentation/RELEASE-NOTES.md."
          } > dist/release/NOTES.md

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: KMOS Ecosystem v${{ steps.meta.outputs.version }}
          body_path: dist/release/NOTES.md
          files: |
            dist/release/*.tgz
            dist/release/SHA256SUMS.txt

      - name: Summary
        run: |
          echo "Images: kmos, knowledge-studio, podcast-studio @ ${{ steps.meta.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Olares chart + checksums attached to the GitHub Release." >> "$GITHUB_STEP_SUMMARY"
