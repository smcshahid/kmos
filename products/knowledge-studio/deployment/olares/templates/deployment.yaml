apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-studio
  namespace: {{ .Release.Namespace }}
  labels:
    app: knowledge-studio
spec:
  replicas: 1   # in-memory read models + per-source job cache are per-pod; do NOT scale beyond 1
  selector:
    matchLabels:
      app: knowledge-studio
  template:
    metadata:
      labels:
        app: knowledge-studio
    spec:
      containers:
        - name: knowledge-studio
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            # SHARED-DATABASE mode (recommended): explicit .Values.databaseUrl points
            # Knowledge Studio at the SAME PostgreSQL the KMOS app uses — one shared
            # institutional memory (durable event log + job state). When empty, fall
            # back to the Olares-injected postgres.* (ISOLATED mode). Verify the exact
            # injected keys against your Olares version.
            - name: KMOS_DATABASE_URL
              value: {{ .Values.databaseUrl | default (printf "postgres://%s:%s@%s:%v/%s" .Values.postgres.username .Values.postgres.password .Values.postgres.host .Values.postgres.port .Values.postgres.databases.studio) | quote }}
            - name: KMOS_ENFORCE
              value: "{{ .Values.enforce }}"
            # Frictionless YouTube: use the in-pod caption sidecar when enabled, else the
            # explicit captionEndpoint (empty → YouTube asks for a pasted transcript).
            - name: KS_CAPTION_ENDPOINT
              value: {{ if .Values.captionService.enabled }}{{ printf "http://localhost:%v" .Values.captionService.port | quote }}{{ else }}{{ .Values.captionEndpoint | quote }}{{ end }}
            # AI provider — switch by CONFIG (PROVIDER-GUIDE.md). Generic selection of
            # ANY provider; empty provider → the ollama shortcut / offline reference.
            - name: KMOS_LLM_PROVIDER
              value: {{ .Values.llm.provider | quote }}
            - name: KMOS_LLM_BASE_URL
              value: {{ .Values.llm.baseUrl | quote }}
            - name: KMOS_LLM_MODEL
              value: {{ .Values.llm.model | quote }}
            - name: KMOS_LLM_API_KEY
              value: {{ .Values.llm.apiKey | quote }}
            # Legacy Ollama shortcut (used when KMOS_LLM_PROVIDER is empty).
            - name: OLLAMA_URL
              value: {{ .Values.ollama.url | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 12
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.captionService.enabled }}
        # Caption/ASR sidecar (yt-dlp + Whisper/Speaches). Same pod → Knowledge Studio
        # reaches it at http://localhost:<port>. Provider-independent via SPEACHES_URL.
        - name: caption-service
          image: "{{ .Values.captionService.image.repository }}:{{ .Values.captionService.image.tag }}"
          imagePullPolicy: {{ .Values.captionService.image.pullPolicy }}
          ports:
            - name: caption
              containerPort: {{ .Values.captionService.port }}
          env:
            - name: PORT
              value: "{{ .Values.captionService.port }}"
            - name: SPEACHES_URL
              value: {{ .Values.captionService.speachesUrl | quote }}
            - name: ASR_MODEL
              value: {{ .Values.captionService.asrModel | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: caption
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.captionService.resources | nindent 12 }}
        {{- end }}
