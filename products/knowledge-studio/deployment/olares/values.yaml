# Knowledge Studio Olares Application Chart — values.
# PREPARED, NOT VALIDATED on a real Olares instance from the engineering environment.
# Knowledge Studio is a COMPANION to the KMOS deployment: it is a second stateless
# compute deployable over the SAME shared PostgreSQL event log (one institutional
# memory; no duplicate database). See DEPLOYMENT-GUIDE.md for the two sharing modes.

image:
  # Build+push from products/knowledge-studio/Dockerfile (see .github workflow).
  # NOT yet published — build and push before install, or point at your registry.
  repository: malikshahid85/knowledge-studio
  tag: "1.1.0"
  pullPolicy: IfNotPresent

# SHARED-DATABASE MODE (recommended): point Knowledge Studio at the SAME PostgreSQL
# the KMOS app uses, so processed knowledge is one shared institutional memory across
# both apps. Set this to the KMOS database URL reachable in-cluster. When empty, the
# chart falls back to the Olares-injected postgres.* below (ISOLATED mode — Knowledge
# Studio gets its own event log, NOT shared with KMOS).
databaseUrl: ""

# DEFAULT (recommended for the Olares upload flow): Olares-injected middleware — the
# app gets its own Olares-managed PostgreSQL, exactly like the KMOS app does. Durable
# across restarts. Placeholders below are for local `helm template` rendering only;
# Olares overrides them at install from the OlaresManifest middleware declaration.
postgres:
  host: postgres
  port: 5432
  username: studio
  password: changeme
  databases:
    studio: studio

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Attribution enforcement (CRIT-2). Off by default; Olares supplies the user identity
# a production wiring would map into a KMOS CallContext.
enforce: false

# FRICTIONLESS YOUTUBE. Explicit caption/ASR endpoint (KS_CAPTION_ENDPOINT). Leave empty
# to auto-use the sidecar below when it is enabled.
captionEndpoint: ""

# Optional caption/ASR sidecar (yt-dlp + Whisper/Speaches) in the SAME pod, so YouTube URLs
# process end-to-end and Knowledge Studio reaches it at http://localhost:8092 — no cross-app
# networking. Point speachesUrl at your Olares Whisper/Speaches server for the ASR fallback
# (captions-only works without it). Provider-independent: any OpenAI-audio-compatible ASR.
captionService:
  enabled: false
  image:
    repository: malikshahid85/knowledge-studio-caption
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  port: 8092
  speachesUrl: ""            # e.g. http://speaches.<ns>:8000  (empty → captions only)
  asrModel: "Systran/faster-whisper-small"
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }

# Richer concepts: point at your Olares Ollama for LLM-backed concept extraction
# (provider-independent, behind the KMOS capability contract; falls back to the reference
# extractor on any failure). Empty url → the offline reference extractor.
ollama:
  url: ""            # e.g. http://ollama.<ns>:11434
  model: "llama3.1"
